<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title> Convert Money</title>

</head>

<body>
    <img class="logo" src="./Assets/logo.gif" alt="logo-money">

    <main>
        <label>
            <b>Converter de:</b>

                <select class="select-de">
                <option value="real">R$ Real Brasileiro</option>
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
                <option value="bitcoin">₿ biticoin</option>

            </select>
        </label>

        <label>
            <b>Converter para:</b>

                <select class="currency-select">
                <option value="real">R$ Real Brasileiro</option>
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
                <option value="bitcoin">₿ biticoin</option>


            </select>
        </label>

        <label>
            <b>Valor</b>
            <input class="input-currency" placeholder="0.0">
        </label>

        <button class="convert-button">Converter</button>

        <section>

            <div class="box">
                <img class="img-converter" src="./Assets/Real.png" alt=" logo-converter">
                <p class="currency" id="currency-real"><b>Real</b></p>
                <p class="starting-value">R$ 0.00</p>
            </div>

            <img class="seta" src="./Assets/Seta.png" alt="seta">

            <div class="box">
                <img class="currency-img" src="./Assets/Dolar.png" alt="logo-convertido">
                <p class="currency" id="currency-name"><b>Dólar Americano </b></p>
                <p class="value-convert">US$ 0.0</p>
            </div>


        </section>
    </main>
    <script src="script.js" defer></script>
</body>

</html>
